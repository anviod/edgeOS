<svg width="1000" height="1100" viewBox="0 0 1000 1100" xmlns="http://www.w3.org/2000/svg">
  <style>
    .bg { fill: #ffffff; }
    .box-outline { fill: #ffffff; stroke: #334155; stroke-width: 1.5; }
    .container-bg { fill: #f8fafc; stroke: #94a3b8; stroke-width: 1; stroke-dasharray: 4; }
    .header-text { font-family: 'Monospace', 'Courier New', monospace; font-size: 18px; font-weight: bold; fill: #0f172a; }
    .section-title { font-family: 'Monospace', 'Courier New', monospace; font-size: 14px; font-weight: bold; fill: #475569; }
    .content-text { font-family: 'Monospace', 'Courier New', monospace; font-size: 12px; fill: #334155; }
    .formula-text { font-family: 'Monospace', 'Courier New', monospace; font-size: 16px; fill: #6366f1; font-weight: bold; }
    .tag-text { font-family: 'Monospace', 'Courier New', monospace; font-size: 11px; fill: #64748b; }
    
    /* 基础连接线 */
    .base-line { fill: none; stroke: #cbd5e1; stroke-width: 1.5; }
    
    /* 粒子流动效果 */
    .energy-flow {
      fill: none;
      stroke: #6366f1;
      stroke-width: 2;
      stroke-dasharray: 6, 14;
      animation: power-flow 3.5s linear infinite;
    }
    
    @keyframes power-flow {
      from { stroke-dashoffset: 100; }
      to { stroke-dashoffset: 0; }
    }
  </style>

  <defs>
    <marker id="arrow-slate" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#94a3b8"/>
    </marker>
  </defs>

  <rect width="1000" height="1100" class="bg" />

  <rect x="50" y="20" width="900" height="40" class="box-outline" />
  <text x="500" y="47" text-anchor="middle" class="header-text">节能优化算法流程规范 (Energy Saving Optimization)</text>

  <text x="50" y="90" class="section-title">01. 能耗数据采集 (Multi-Gateway Ingestion)</text>
  <rect x="50" y="110" width="900" height="180" class="container-bg" />
  
  <g transform="translate(80, 140)">
    <rect x="0" y="0" width="240" height="120" class="box-outline" />
    <text x="15" y="25" class="section-title">采集网关 #1</text>
    <text x="15" y="55" class="tag-text">• CPU/MEM Utilization</text>
    <text x="15" y="75" class="tag-text">• Network Traffic (bps)</text>
    <text x="15" y="95" class="tag-text">• Disk I/O Wait</text>

    <rect x="295" y="0" width="240" height="120" class="box-outline" />
    <text x="310" y="25" class="section-title">采集网关 #2</text>
    <text x="310" y="55" class="tag-text">• Core Temperature</text>
    <text x="310" y="75" class="tag-text">• Power Consumption</text>
    <text x="310" y="95" class="tag-text">• Process Thread Count</text>

    <rect x="590" y="0" width="240" height="120" class="box-outline" />
    <text x="605" y="25" class="section-title">采集网关 #3</text>
    <text x="605" y="55" class="tag-text">• Buffer Cache Usage</text>
    <text x="605" y="75" class="tag-text">• Context Switches</text>
    <text x="605" y="95" class="tag-text">• Interrupt Rate</text>
  </g>

  <text x="50" y="325" class="section-title">02. 能耗计算与评估 (Power Analysis)</text>
  <g transform="translate(50, 345)">
    <rect width="900" height="120" class="box-outline" />
    <rect width="900" height="30" fill="#f1f5f9" stroke="#334155" />
    <text x="450" y="20" text-anchor="middle" class="section-title">实时能耗数学模型</text>
    <text x="450" y="70" text-anchor="middle" class="formula-text">P_total = P_base + Σ(P_device * Load_factor)</text>
    <text x="450" y="100" text-anchor="middle" class="tag-text">实时功率计算 | 历史趋势对比 | 优化潜力评估</text>
  </g>

  <path d="M500 290 V 345" class="base-line" marker-end="url(#arrow-slate)" />
  <path d="M500 290 V 345" class="energy-flow" />

  <text x="50" y="500" class="section-title">03. 优化策略生成 (Strategy Synthesis)</text>
  <rect x="50" y="520" width="900" height="300" class="container-bg" />
  
  <g transform="translate(100, 550)">
    <text x="0" y="0" class="content-text">策略链：负载预测 → 频率调整 → 采集间隔优化 → 任务迁移</text>
    
    <rect x="0" y="40" width="220" height="180" class="box-outline" stroke="#ef4444" />
    <rect x="0" y="40" width="220" height="30" fill="#fef2f2" stroke="#ef4444" />
    <text x="110" y="60" text-anchor="middle" class="section-title" fill="#ef4444">高负载时段</text>
    <text x="20" y="100" class="content-text">• 满频运行 (Performance)</text>
    <text x="20" y="130" class="content-text">• 100% 性能输出</text>
    <text x="110" y="180" text-anchor="middle" class="formula-text" fill="#ef4444">LEVEL: MAX</text>

    <rect x="270" y="40" width="220" height="180" class="box-outline" stroke="#3b82f6" />
    <rect x="270" y="40" width="220" height="30" fill="#eff6ff" stroke="#3b82f6" />
    <text x="380" y="60" text-anchor="middle" class="section-title" fill="#3b82f6">正常负载</text>
    <text x="290" y="100" class="content-text">• 动态调频 (DVFS)</text>
    <text x="290" y="130" class="content-text">• 70% - 90% 性能</text>
    <text x="380" y="180" text-anchor="middle" class="formula-text" fill="#3b82f6">LEVEL: BALANCED</text>

    <rect x="540" y="40" width="220" height="180" class="box-outline" stroke="#10b981" />
    <rect x="540" y="40" width="220" height="30" fill="#ecfdf5" stroke="#10b981" />
    <text x="650" y="60" text-anchor="middle" class="section-title" fill="#10b981">低负载时段</text>
    <text x="560" y="100" class="content-text">• 降频休眠 (Sleep)</text>
    <text x="560" y="130" class="content-text">• 30% - 50% 性能</text>
    <text x="650" y="180" text-anchor="middle" class="formula-text" fill="#10b981">LEVEL: ECO</text>
  </g>

  <path d="M500 465 V 520" class="base-line" marker-end="url(#arrow-slate)" />
  <path d="M500 465 V 520" class="energy-flow" style="animation-delay: 1s;" />

  <text x="50" y="855" class="section-title">04. 策略执行与监控 (Execution &amp; Feedback)</text>
  <g transform="translate(50, 875)">
    <rect width="900" height="120" class="box-outline" />
    <path d="M100 60 H 800" class="base-line" stroke-dasharray="2,2" />
    
    <g transform="translate(50, 40)">
      <text x="0" y="0" class="tag-text">指令下发</text>
      <circle cx="0" cy="20" r="4" fill="#334155" />
      
      <text x="260" y="0" class="tag-text">策略应用</text>
      <circle cx="260" cy="20" r="4" fill="#334155" />

      <text x="530" y="0" class="tag-text">效果验证</text>
      <circle cx="530" cy="20" r="4" fill="#334155" />

      <text x="800" y="0" class="tag-text">指标上报</text>
      <circle cx="800" cy="20" r="4" fill="#334155" />
    </g>
  </g>

  <path d="M500 820 V 875" class="base-line" marker-end="url(#arrow-slate)" />
  <path d="M500 820 V 875" class="energy-flow" style="animation-delay: 2s;" />

  <path d="M950 935 H 980 V 150 H 950" class="base-line" stroke-dasharray="5,5" marker-end="url(#arrow-slate)" />
  <text x="975" y="500" text-anchor="middle" class="tag-text" transform="rotate(90, 975, 500)">Optimization Feedback Loop</text>

  <line x1="50" y1="1040" x2="950" y2="1040" stroke="#e2e8f0" stroke-width="1" />
  <text x="50" y="1065" class="tag-text">EDGE OS v2.4.0 | 节能优化核心算法组件</text>
  <text x="950" y="1065" text-anchor="end" class="tag-text">CONFIDENTIAL | 2026-04</text>
</svg>
