<svg width="1000" height="850" viewBox="0 0 1000 850" xmlns="http://www.w3.org/2000/svg">
  <style>
    .bg { fill: #ffffff; }
    .box-outline { fill: #ffffff; stroke: #334155; stroke-width: 1.5; }
    .container-outline { fill: #f8fafc; stroke: #94a3b8; stroke-width: 1; stroke-dasharray: 4; }
    .label-header { font-family: 'Monospace', 'Courier New', monospace; font-size: 18px; font-weight: bold; fill: #1e293b; }
    .label-section { font-family: 'Monospace', 'Courier New', monospace; font-size: 14px; font-weight: bold; fill: #475569; }
    .label-content { font-family: 'Monospace', 'Courier New', monospace; font-size: 12px; fill: #334155; }
    .label-id { font-family: 'Monospace', 'Courier New', monospace; font-size: 11px; fill: #64748b; }
    
    /* 基础连接线 */
    .base-line { fill: none; stroke: #cbd5e1; stroke-width: 1.5; }
    
    /* 粒子流动效果 */
    .particle-flow {
      fill: none;
      stroke: #3b82f6;
      stroke-width: 2;
      stroke-dasharray: 4, 12;
      animation: flow 3s linear infinite;
    }
    
    @keyframes flow {
      from { stroke-dashoffset: 100; }
      to { stroke-dashoffset: 0; }
    }
  </style>

  <defs>
    <marker id="arrow-gray" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#cbd5e1"/>
    </marker>
    <marker id="arrow-blue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#3b82f6"/>
    </marker>
  </defs>

  <rect width="1000" height="850" class="bg" />

  <rect x="50" y="20" width="900" height="40" class="box-outline" />
  <text x="500" y="47" text-anchor="middle" class="label-header">影子设备自动发现流程规范</text>

  <text x="50" y="90" class="label-section">01. 设备上线通知 (Device Online Notification)</text>
  
  <g transform="translate(50, 110)">
    <rect width="160" height="110" class="box-outline" />
    <text x="15" y="25" class="label-section">边缘采集 #1</text>
    <text x="15" y="55" class="label-content">• BACnet</text>
    <text x="15" y="75" class="label-content">• Modbus</text>
    <text x="15" y="95" class="label-content">• OPC UA</text>
  </g>

  <g transform="translate(410, 110)">
    <rect width="180" height="110" class="box-outline" />
    <text x="15" y="25" class="label-section">主母皇节点</text>
    <text x="15" y="50" class="label-content">• 接收通知</text>
    <text x="15" y="65" class="label-content">• 验证设备</text>
    <text x="15" y="80" class="label-content">• 分配影子</text>
    <text x="15" y="95" class="label-content">• 广播同步</text>
  </g>

  <g transform="translate(770, 110)">
    <rect width="180" height="110" class="box-outline" />
    <text x="15" y="25" class="label-section">影子设备注册表</text>
    <text x="15" y="55" class="label-content">• 设备ID / 元数据</text>
    <text x="15" y="75" class="label-content">• 采集配置映射</text>
    <text x="15" y="95" class="label-content">• 状态存储</text>
  </g>

  <path d="M210 165 L410 165" class="base-line" marker-end="url(#arrow-gray)" />
  <path d="M210 165 L410 165" class="particle-flow" />
  
  <path d="M590 165 L770 165" class="base-line" marker-end="url(#arrow-gray)" />
  <path d="M590 165 L770 165" class="particle-flow" />

  <text x="50" y="260" class="label-section">02. 影子设备分配 (Shadow Device Allocation)</text>
  <rect x="50" y="280" width="900" height="280" class="container-outline" />
  
  <g transform="translate(100, 310)">
    <text x="0" y="0" class="label-content">逻辑判定链：</text>
    <text x="100" y="0" class="label-section">类型判断 → 模板匹配 → 配置生成 → 注册表写入</text>
    <path d="M100 10 L680 10" class="base-line" stroke-dasharray="2,2" />
  </g>

  <g transform="translate(80, 360)">
    <rect x="0" y="0" width="240" height="150" class="box-outline" />
    <text x="15" y="30" class="label-section">BACnet 设备模板</text>
    <text x="15" y="60" class="label-content">匹配规则: Protocol == 'BACnet'</text>
    <text x="15" y="90" class="label-content">ShadowID 格式:</text>
    <text x="15" y="115" class="label-id" fill="#3b82f6">bac-{device_uuid}</text>
    
    <rect x="290" y="0" width="240" height="150" class="box-outline" />
    <text x="305" y="30" class="label-section">Modbus 设备模板</text>
    <text x="305" y="60" class="label-content">匹配规则: Protocol == 'Modbus'</text>
    <text x="305" y="90" class="label-content">ShadowID 格式:</text>
    <text x="305" y="115" class="label-id" fill="#3b82f6">mod-{device_uuid}</text>

    <rect x="580" y="0" width="240" height="150" class="box-outline" />
    <text x="595" y="30" class="label-section">OPC UA 设备模板</text>
    <text x="595" y="60" class="label-content">匹配规则: Protocol == 'OPCUA'</text>
    <text x="595" y="90" class="label-content">ShadowID 格式:</text>
    <text x="595" y="115" class="label-id" fill="#3b82f6">opc-{device_uuid}</text>
  </g>

  <text x="50" y="600" class="label-section">03. 状态同步广播 (Status Sync Broadcast)</text>
  
  <g transform="translate(50, 630)">
    <rect width="180" height="100" class="box-outline" />
    <text x="15" y="30" class="label-section">主母皇节点</text>
    <text x="15" y="60" class="label-content">• 状态变更广播</text>
    <text x="15" y="80" class="label-content">• 事务日志持久化</text>
  </g>

  <g transform="translate(410, 630)">
    <rect width="180" height="100" class="box-outline" />
    <text x="15" y="30" class="label-section">备用母皇节点</text>
    <text x="15" y="60" class="label-content">• 实时状态接管</text>
    <text x="15" y="80" class="label-content">• 响应确认回执</text>
  </g>

  <g transform="translate(770, 630)">
    <rect width="180" height="100" class="box-outline" />
    <text x="15" y="30" class="label-section">边缘采集 #2</text>
    <text x="15" y="60" class="label-content">• 拉取最新影子配置</text>
    <text x="15" y="80" class="label-content">• 启动增量采集任务</text>
  </g>

  <path d="M230 680 L410 680" class="base-line" marker-end="url(#arrow-gray)" />
  <path d="M230 680 L410 680" class="particle-flow" style="animation-duration: 2s;" />
  
  <path d="M590 680 L770 680" class="base-line" marker-end="url(#arrow-gray)" />
  <path d="M590 680 L770 680" class="particle-flow" style="animation-duration: 2s;" />

  <line x1="50" y1="780" x2="950" y2="780" stroke="#e2e8f0" stroke-width="1" />
  <text x="50" y="805" class="label-id">EDGE OS v2.4.0 | 影子引擎核心协议栈</text>
  <text x="950" y="805" text-anchor="end" class="label-id">SYSTEM CONFIDENTIAL</text>
</svg>
