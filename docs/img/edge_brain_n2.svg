<svg width="1000" height="1500" viewBox="0 0 1000 1500" xmlns="http://www.w3.org/2000/svg">
  <style>
    .bg { fill: #ffffff; }
    .box-outline { fill: #ffffff; stroke: #334155; stroke-width: 1.5; }
    .container-bg { fill: #f8fafc; stroke: #94a3b8; stroke-width: 1; stroke-dasharray: 4,2; }
    .header-text { font-family: 'Monospace', 'Courier New', monospace; font-size: 18px; font-weight: bold; fill: #0f172a; }
    .section-title { font-family: 'Monospace', 'Courier New', monospace; font-size: 14px; font-weight: bold; fill: #475569; }
    .content-text { font-family: 'Monospace', 'Courier New', monospace; font-size: 12px; fill: #334155; }
    .label-id { font-family: 'Monospace', 'Courier New', monospace; font-size: 11px; fill: #64748b; }
    
    /* 连接线基础样式 */
    .base-line { fill: none; stroke: #cbd5e1; stroke-width: 1.5; }
    
    /* 粒子流动效果 */
    .data-flow {
      fill: none;
      stroke: #0ea5e9;
      stroke-width: 2;
      stroke-dasharray: 6, 14;
      animation: flow-anim 3s linear infinite;
    }
    
    .feedback-flow {
      fill: none;
      stroke: #10b981;
      stroke-width: 2;
      stroke-dasharray: 4, 12;
      animation: flow-anim 2s linear reverse infinite;
    }
    
    @keyframes flow-anim {
      from { stroke-dashoffset: 100; }
      to { stroke-dashoffset: 0; }
    }
  </style>

  <defs>
    <marker id="arrow-slate" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#94a3b8"/>
    </marker>
  </defs>

  <rect width="1000" height="1500" class="bg" />

  <rect x="50" y="20" width="900" height="40" class="box-outline" />
  <text x="500" y="47" text-anchor="middle" class="header-text">EDGE OS v2.4.0 全业务闭环流程规范</text>

  <text x="50" y="90" class="section-title">01. 原始数据采集 (Raw Data Ingestion)</text>
  <rect x="50" y="110" width="900" height="240" class="container-bg" />
  
  <g transform="translate(80, 140)">
    <rect width="240" height="180" class="box-outline" />
    <text x="20" y="30" class="section-title">采集网关 #1-#N</text>
    <text x="20" y="60" class="content-text">• CPU使用率 / 内存使用</text>
    <text x="20" y="80" class="content-text">• 网络流量 (bps/pps)</text>
    <text x="20" y="100" class="content-text">• 存储 I/O Wait</text>
    <text x="20" y="120" class="content-text">• 协议: Modbus/S7/MQTT</text>
    <text x="20" y="145" class="label-id">公式: P_total = P_base + ΣP_dev</text>
  </g>

  <g transform="translate(450, 140)">
    <rect width="450" height="180" class="box-outline" />
    <text x="20" y="30" class="section-title">影子 Ingress 与注册表</text>
    <text x="20" y="60" class="label-id">• 实时数据上报物理设备快照</text>
    <text x="20" y="80" class="label-id">• 影子设备注册表写入 (Ver. Update)</text>
    <text x="20" y="100" class="label-id">• 变更消息广播队列生成</text>
    <text x="20" y="125" class="content-text">──► 写入本地影子 ──► 同步消息</text>
  </g>

  <text x="50" y="380" class="section-title">02. 计算评估层 (Analysis &amp; Evaluation)</text>
  <rect x="50" y="400" width="900" height="180" class="box-outline" />
  <g transform="translate(100, 440)">
    <text x="0" y="0" class="content-text">计算链路：能耗模型分析 → 实时功率计算 → 历史趋势对比 → 优化潜力评估</text>
    <rect x="0" y="30" width="800" height="100" class="container-bg" />
    <text x="20" y="55" class="content-text">核心算法指标：</text>
    <text x="20" y="80" class="label-id">• 负载预测 (Load Prediction) | 频率调整余量 (DVFS Margin)</text>
    <text x="20" y="100" class="label-id">• 任务迁移可行性评估 | 采集间隔优化阈值</text>
  </g>

  <text x="50" y="610" class="section-title">03. 策略决策与冗余控制 (Swarm Strategy)</text>
  <rect x="50" y="630" width="900" height="340" class="container-bg" />
  
  <g transform="translate(80, 670)">
    <rect width="250" height="160" class="box-outline" stroke="#6366f1" />
    <text x="125" y="25" text-anchor="middle" class="section-title" fill="#6366f1">主母皇 (Primary)</text>
    <text x="20" y="55" class="label-id">• 决策制定 / 任务调度</text>
    <text x="20" y="75" class="label-id">• 资源分配 / 故障检测</text>
    <text x="20" y="100" class="content-text" fill="#ef4444">故障检测逻辑：</text>
    <text x="20" y="120" class="label-id">超时判定 → 连续失败检查 → 确认</text>

    <rect x="300" y="180" width="300" height="100" class="box-outline" fill="#f1f5f9" />
    <text x="150" y="30" text-anchor="middle" class="section-title" transform="translate(300,180)">共享状态存储 (bbolt)</text>
    <text x="20" y="60" class="label-id" transform="translate(300,180)">• 影子设备表 / 任务配置 / 同步日志</text>

    <rect x="570" y="0" width="250" height="160" class="box-outline" />
    <text x="125" y="25" text-anchor="middle" class="section-title" transform="translate(570,0)">备用母皇 (Secondary)</text>
    <text x="20" y="55" class="label-id" transform="translate(570,0)">• 状态同步 / 故障备援</text>
    <text x="20" y="75" class="label-id" transform="translate(570,0)">• 升级主母皇切换流程:</text>
    <text x="20" y="95" class="label-id" transform="translate(570,0)">1. 锁定存储 2. 同步WAL 3. 广播</text>
  </g>

  <text x="50" y="1000" class="section-title">04. 执行监控与反控闭环 (Execution &amp; Closed-Loop)</text>
  <rect x="50" y="1020" width="900" height="340" class="box-outline" />
  
  <g transform="translate(100, 1060)">
    <text x="0" y="0" class="content-text">执行策略：高负载(满频) | 正常负载(动态调频) | 低负载(降频休眠)</text>
    
    <g transform="translate(0, 30)">
      <rect width="800" height="120" class="container-bg" />
      <text x="20" y="30" class="section-title">策略下发流程：</text>
      <text x="20" y="55" class="content-text">北向适配器 ──► 写入影子 ──► 消息路由 ──► 目标采集网关 ──► 设备</text>
      <text x="20" y="85" class="label-id">保障机制: QoS 1 (ACK确认) | QoS 2 (最终确认) | 全链路追踪</text>
    </g>

    <g transform="translate(0, 170)">
      <rect width="800" height="100" class="box-outline" stroke="#10b981" />
      <text x="20" y="30" class="section-title" fill="#10b981">反控闭环优化 (Feedback Loop)</text>
      <text x="20" y="55" class="content-text">原主母皇恢复 ──► 角色降级 ──► 热备同步 ──► 优化策略修正</text>
      <text x="20" y="80" class="label-id">效果验证: 根据上报指标自动调整能耗计算模型，实现自动化迭代</text>
    </g>
  </g>

  <path d="M500 350 V 400" class="data-flow" marker-end="url(#arrow-slate)" />
  <path d="M500 580 V 630" class="data-flow" marker-end="url(#arrow-slate)" />
  <path d="M500 970 V 1020" class="data-flow" marker-end="url(#arrow-slate)" />
  
  <path d="M950 1190 H 980 V 150 H 950" class="feedback-flow" marker-end="url(#arrow-slate)" />
  <text x="975" y="650" text-anchor="middle" class="label-id" transform="rotate(90, 975, 650)">CLOSED-LOOP OPTIMIZATION FEEDBACK</text>

  <line x1="50" y1="1420" x2="950" y2="1420" stroke="#e2e8f0" stroke-width="1" />
  <text x="50" y="1445" class="label-id">EDGE OS v2.4.0 | 工业级边缘计算全量业务逻辑蓝图</text>
  <text x="950" y="1445" text-anchor="end" class="label-id">COPYRIGHT 2026 | PROJECT: EDGEx_OS</text>
</svg>
