<svg width="1000" height="1200" viewBox="0 0 1000 1200" xmlns="http://www.w3.org/2000/svg">
  <style>
    .bg { fill: #ffffff; }
    .box-outline { fill: #ffffff; stroke: #334155; stroke-width: 1.5; }
    .container-bg { fill: #f8fafc; stroke: #94a3b8; stroke-width: 1; stroke-dasharray: 4,2; }
    .header-text { font-family: 'Monospace', 'Courier New', monospace; font-size: 18px; font-weight: bold; fill: #0f172a; }
    .section-title { font-family: 'Monospace', 'Courier New', monospace; font-size: 14px; font-weight: bold; fill: #475569; }
    .content-text { font-family: 'Monospace', 'Courier New', monospace; font-size: 12px; fill: #334155; }
    .label-id { font-family: 'Monospace', 'Courier New', monospace; font-size: 11px; fill: #64748b; }
    
    /* 基础连接线 */
    .base-line { fill: none; stroke: #cbd5e1; stroke-width: 1.5; }
    
    /* 粒子流动效果 */
    .alert-particle {
      fill: none;
      stroke: #ef4444; /* 故障告警粒子 */
      stroke-width: 2;
      stroke-dasharray: 4, 12;
      animation: failover-flow 2.5s linear infinite;
    }
    
    .sync-particle {
      fill: none;
      stroke: #0ea5e9; /* 同步/恢复粒子 */
      stroke-width: 2;
      stroke-dasharray: 4, 12;
      animation: failover-flow 3s linear infinite;
    }
    
    @keyframes failover-flow {
      from { stroke-dashoffset: 100; }
      to { stroke-dashoffset: 0; }
    }
  </style>

  <defs>
    <marker id="arrow-slate" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#94a3b8"/>
    </marker>
  </defs>

  <rect width="1000" height="1200" class="bg" />

  <rect x="50" y="20" width="900" height="40" class="box-outline" />
  <text x="500" y="47" text-anchor="middle" class="header-text">故障转移流程协议 (Failover &amp; Recovery Protocol)</text>

  <text x="50" y="95" class="section-title">01. 故障检测 (Fault Detection)</text>
  <rect x="50" y="115" width="900" height="150" class="container-bg" stroke="#ef4444" stroke-opacity="0.5" />
  
  <g transform="translate(100, 145)">
    <text x="0" y="0" class="content-text">检测链路：心跳检测 → 超时判定 → 连续失败检查 → 故障确认</text>
    <rect x="0" y="30" width="800" height="70" class="box-outline" stroke="#ef4444" />
    <text x="20" y="55" class="content-text" fill="#ef4444">备用母皇判断逻辑：</text>
    <text x="20" y="80" class="label-id">"主母皇节点心跳超时" ──► 重试 3 次 ──► 确认节点离线 (ACK_FAIL)</text>
  </g>

  <path d="M500 265 V 325" class="base-line" marker-end="url(#arrow-slate)" />
  <path d="M500 265 V 325" class="alert-particle" />

  <text x="50" y="305" class="section-title">02. 故障转移准备 (Migration Readiness)</text>
  <rect x="50" y="325" width="900" height="220" class="box-outline" />
  
  <g transform="translate(100, 365)">
    <text x="0" y="0" class="content-text">准备阶段：状态锁定 → 日志同步 → 任务清单 → 资源盘点</text>
    <g transform="translate(0, 30)">
      <rect width="380" height="110" class="container-bg" />
      <text x="15" y="25" class="section-title">备用母皇行为链</text>
      <text x="15" y="50" class="label-id">• 锁定共享存储 (Prevent Brain-split)</text>
      <text x="15" y="70" class="label-id">• 同步最新 WAL 增量日志</text>
      <text x="15" y="90" class="label-id">• 统计待处理任务 / 资源余量检查</text>
    </g>
    <rect x="500" y="30" width="300" height="110" class="box-outline" fill="#f1f5f9" />
    <text x="650" y="65" text-anchor="middle" class="section-title">共享状态存储</text>
    <text x="650" y="90" text-anchor="middle" class="label-id" fill="#ef4444">[LOCKED]</text>
  </g>

  <path d="M500 545 V 605" class="base-line" marker-end="url(#arrow-slate)" />
  <path d="M500 545 V 605" class="sync-particle" />

  <text x="50" y="585" class="section-title">03. 角色切换 (Role Promotion)</text>
  <rect x="50" y="605" width="900" height="220" class="box-outline" stroke="#6366f1" stroke-width="2" />
  
  <g transform="translate(100, 645)">
    <text x="0" y="0" class="section-title" fill="#6366f1">角色升级：Secondary ──► Primary</text>
    
    <g transform="translate(0, 30)">
      <text x="0" y="20" class="content-text">1. 更新节点元数据类型</text>
      <text x="0" y="45" class="content-text">2. 接管集群通信 (Open Ingress Port)</text>
      <text x="0" y="70" class="content-text">3. 恢复任务调度器</text>
      <text x="0" y="95" class="content-text">4. 广播角色变更通知</text>
    </g>
    
    <circle cx="650" cy="70" r="30" fill="#e0e7ff" stroke="#6366f1" />
    <text x="650" y="75" text-anchor="middle" class="section-title" fill="#6366f1">LIVE</text>
  </g>

  <path d="M500 825 V 885" class="base-line" marker-end="url(#arrow-slate)" />
  <path d="M500 825 V 885" class="sync-particle" style="animation-delay: 1.5s;" />

  <text x="50" y="865" class="section-title">04. 故障节点恢复 (Node Recovery &amp; Demotion)</text>
  <rect x="50" y="885" width="900" height="200" class="container-bg" />
  
  <g transform="translate(100, 925)">
    <text x="0" y="0" class="content-text">恢复链路：原主母皇上线 → 角色降级 → 热备数据同步</text>
    <g transform="translate(0, 30)">
      <rect width="800" height="100" class="box-outline" />
      <text x="20" y="30" class="section-title">后置同步逻辑</text>
      <text x="20" y="55" class="label-id">• 接收新主母皇状态推送</text>
      <text x="20" y="80" class="label-id">• 同步故障期间的数据差异 (Delta Sync) | 维持监控心跳</text>
    </g>
  </g>

  <path d="M900 1000 H 930 V 712 H 900" class="base-line" stroke-dasharray="5,5" />
  <path d="M900 1000 H 930 V 712 H 900" class="sync-particle" />

  <line x1="50" y1="1130" x2="950" y2="1130" stroke="#e2e8f0" stroke-width="1" />
  <text x="50" y="1155" class="label-id">EDGE OS v2.4.0 | 故障自愈与集群重构规范</text>
  <text x="950" y="1155" text-anchor="end" class="label-id">SYSTEM CRITICAL | 2026-04</text>
</svg>
