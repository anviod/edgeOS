<!doctype html>
<html lang="{{ page.lang | default: site.lang | default: 'zh-CN' }}">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <meta
      name="description"
      content="{{ page.description | default: site.description | strip_html | strip_newlines | escape }}"
    />
    <script>
      (function () {
        var storedTheme = localStorage.getItem('edgeos-docs-theme');
        var theme = storedTheme === 'light' ? 'light' : 'dark';
        document.documentElement.setAttribute('data-theme', theme);
      })();
    </script>
    <link rel="stylesheet" href="{{ '/assets/style.css' | relative_url }}" />
  </head>
  <body class="landing-body">
    <div class="landing-shell">
      <header class="site-header site-header--landing">
        <div class="site-header__inner">
          <a class="site-brand" href="{{ '/' | relative_url }}">
            <span class="site-brand__eyebrow">Industrial Brain</span>
            <span class="site-brand__title">{{ site.title }}</span>
          </a>
          <nav class="site-nav" aria-label="主导航">
            <a href="#overview">系统概览</a>
            <a href="#capabilities">核心能力</a>
            <a href="#documents">文档入口</a>
            <a href="https://github.com/anviod/EdgeOS" target="_blank" rel="noopener noreferrer">返回项目仓库</a>
            <button
              class="theme-toggle"
              type="button"
              data-theme-toggle
              aria-label="切换黑白主题"
              aria-pressed="false"
            >
              黑色主题
            </button>
          </nav>
        </div>
      </header>

      <main class="landing-main">
        {{ content }}
      </main>
    </div>
    <script>
      (function () {
        var storageKey = 'edgeos-docs-theme';
        var root = document.documentElement;
        var button = document.querySelector('[data-theme-toggle]');
        if (!button) return;

        var labels = {
          dark: '黑色主题',
          light: '白色主题'
        };

        function syncButton(theme) {
          button.textContent = labels[theme];
          button.setAttribute('aria-pressed', String(theme === 'light'));
        }

        syncButton(root.getAttribute('data-theme') || 'dark');

        button.addEventListener('click', function () {
          var currentTheme = root.getAttribute('data-theme') === 'light' ? 'light' : 'dark';
          var nextTheme = currentTheme === 'dark' ? 'light' : 'dark';
          root.setAttribute('data-theme', nextTheme);
          localStorage.setItem(storageKey, nextTheme);
          syncButton(nextTheme);
        });
      })();
    </script>
  </body>
</html>
